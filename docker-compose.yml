services:
  pixel-streaming:
    build: .
    platform: linux/amd64
    network_mode: host
    volumes:
      - ./app:/app/app
      - ./web:/app/web
    environment:
      - PYTHONUNBUFFERED=1
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_PORT=${TURN_PORT:-8888}
      - TURN_USER=${TURN_USER:-}
      - TURN_PASSWORD=${TURN_PASSWORD:-}
    restart: unless-stopped
